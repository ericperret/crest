<!DOCTYPE html>
<html lang="fr">
<head>
<!--
  Fichier  : map.html
  Date     : 2026-05-23
  Version  : 1.1 — BroadcastChannel (window.opener=null sur file://)
  Rôle     : Mapmonde satellite — catalogue des tuiles Copernicus DSM locales
  Scan     : webkitdirectory → parse noms de sous-dossiers → aucun contenu lu
  Clic     : tuile verte → lit le .tif (un seul fichier) → BroadcastChannel → dsm.html
  Fenêtre  : dsm.html ouvert sous le nom 'dsmViewer' (réutilisé à chaque clic)
  Auteur   : Claude Sonnet 4.6 / Anthropic
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copernicus DSM — Carte</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;
  color:#cdd6f4;font-family:'Segoe UI',Arial,sans-serif}
#topbar{position:fixed;top:0;left:0;right:0;height:42px;z-index:2000;
  display:flex;align-items:center;gap:12px;padding:0 16px;
  background:rgba(13,17,23,.88);backdrop-filter:blur(4px);
  border-bottom:1px solid #2a2d3d}
#topbar h1{font-size:.82rem;font-weight:600;color:#b4befe;white-space:nowrap}
.btn{font-size:.70rem;padding:3px 11px;border:1px solid #45475a;border-radius:4px;
  background:#181825;color:#cdd6f4;cursor:pointer;white-space:nowrap}
.btn:hover{background:#2a2d3d;border-color:#89b4fa}
#stats{font-size:.65rem;color:#a6e3a1}
#map{position:fixed;top:42px;left:0;right:0;bottom:0}
#tip{position:fixed;z-index:3000;background:rgba(13,17,23,.92);
  color:#cdd6f4;font-size:.62rem;font-family:'Courier New',monospace;
  padding:3px 9px;border-radius:4px;border:1px solid #2a2d3d;
  pointer-events:none;display:none;white-space:nowrap}
</style>
</head>
<body>

<div id="topbar">
  <h1>Copernicus DSM COG-10</h1>
  <button class="btn" id="btn-open">📂 Ouvrir copernicus/</button>
  <input type="file" id="folder-in" webkitdirectory style="display:none">
  <span id="stats">Aucun dossier scanné</span>
</div>

<div id="map"></div>
<div id="tip"></div>

<script>
// ── Nommage tuiles Copernicus ─────────────────────────────────
// Coin SW : S20_00_E169_00 → swLat=-20, swLon=169
function parseTileName(s) {
  const m = s.match(/([NS])(\d{2})_00_([EW])(\d{3})_00/);
  if (!m) return null;
  return {
    swLat: parseInt(m[2]) * (m[1] === 'S' ? -1 : 1),
    swLon: parseInt(m[4]) * (m[3] === 'W' ? -1 : 1),
  };
}
function tileName(swLat, swLon) {
  const ns = swLat >= 0 ? 'N' : 'S';
  const ew = swLon >= 0 ? 'E' : 'W';
  return `Copernicus_DSM_COG_10_${ns}${Math.abs(swLat).toString().padStart(2,'0')}`
       + `_00_${ew}${Math.abs(swLon).toString().padStart(3,'0')}_00_DEM`;
}
const tKey = (lat, lon) => `${lat},${lon}`;

// downloaded : Map clé → File (.tif)  — contenu NON lu à ce stade
const downloaded = new Map();
let   activeKey  = null;

// ── Carte satellite ───────────────────────────────────────────
const map = L.map('map', { center: [20, 0], zoom: 2 });
L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: '© Esri © Maxar', maxZoom: 17 }
).addTo(map);
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',
  { opacity: 0.8, pane: 'shadowPane' }
).addTo(map);

// ── Grille Copernicus (canvas layer) ─────────────────────────
const CopernicusLayer = L.GridLayer.extend({
  options: { tileSize: 256 },
  createTile(coords) {
    const cv  = document.createElement('canvas');
    const sz  = this.getTileSize();
    cv.width  = sz.x; cv.height = sz.y;
    if (coords.z < 1) return cv;
    const c2  = cv.getContext('2d');
    const m   = this._map, z = coords.z;
    const nw  = m.unproject(L.point(coords.x,     coords.y    ).scaleBy(sz), z);
    const se  = m.unproject(L.point(coords.x + 1, coords.y + 1).scaleBy(sz), z);
    const lonA = Math.max(-180, Math.floor(nw.lng));
    const lonB = Math.min(179,  Math.floor(se.lng));
    const latA = Math.max(-90,  Math.floor(se.lat));
    const latB = Math.min(89,   Math.floor(nw.lat));

    function gp(lat, lon) {
      const p = m.project(L.latLng(lat, lon), z);
      return [p.x - coords.x * sz.x, p.y - coords.y * sz.y];
    }
    for (let swLat = latA; swLat <= latB; swLat++) {
      for (let swLon = lonA; swLon <= lonB; swLon++) {
        const [x0, y0] = gp(swLat + 1, swLon);
        const [x1, y1] = gp(swLat, swLon + 1);
        const w = x1 - x0, h = y1 - y0;
        if (w < 0.5 || h < 0.5) continue;
        const k       = tKey(swLat, swLon);
        const isDL    = downloaded.has(k);
        const isActive = k === activeKey;
        if (isActive) {
          c2.fillStyle = 'rgba(250,200,50,.4)';  c2.fillRect(x0, y0, w, h);
          c2.strokeStyle = '#f8c800'; c2.lineWidth = 2; c2.strokeRect(x0, y0, w, h);
        } else if (isDL) {
          c2.fillStyle = 'rgba(80,200,80,.30)'; c2.fillRect(x0, y0, w, h);
          c2.strokeStyle = '#2a9a2a';
          c2.lineWidth = z >= 5 ? 1 : 0.5; c2.strokeRect(x0, y0, w, h);
        } else if (z >= 3) {
          c2.strokeStyle = 'rgba(130,130,180,.18)';
          c2.lineWidth = 0.4; c2.strokeRect(x0, y0, w, h);
        }
      }
    }
    return cv;
  }
});
const copGrid = new CopernicusLayer().addTo(map);

// ── Tooltip + curseur ─────────────────────────────────────────
const tip = document.getElementById('tip');
map.on('mousemove', e => {
  const swLat = Math.floor(e.latlng.lat);
  const swLon = Math.floor(e.latlng.lng);
  const k = tKey(swLat, swLon);
  if (downloaded.has(k)) {
    map.getContainer().style.cursor = 'pointer';
    tip.textContent = tileName(swLat, swLon);
    tip.style.display = 'block';
    tip.style.left = (e.originalEvent.clientX + 14) + 'px';
    tip.style.top  = (e.originalEvent.clientY - 26) + 'px';
  } else {
    map.getContainer().style.cursor = '';
    tip.style.display = 'none';
  }
});
map.on('mouseout', () => { tip.style.display = 'none'; });

// ── Communication inter-onglets via BroadcastChannel ─────────
// window.opener est null sur file:// (sécurité Chrome/Firefox).
// BroadcastChannel fonctionne entre onglets file:// du même navigateur.
const bc = new BroadcastChannel('copernicus_dsm');
let dsmWindow  = null;
let pendingFile = null;

bc.onmessage = e => {
  // dsm.html signale qu'il est prêt
  if (e.data === 'ready' && pendingFile) {
    bc.postMessage({ type: 'loadFile', file: pendingFile });
    pendingFile = null;
  }
};

map.on('click', e => {
  const swLat = Math.floor(e.latlng.lat);
  const swLon = Math.floor(e.latlng.lng);
  const k = tKey(swLat, swLon);
  if (!downloaded.has(k)) return;

  const file = downloaded.get(k);
  activeKey  = k;
  copGrid.redraw();
  map.fitBounds([[swLat, swLon], [swLat + 1, swLon + 1]], { animate: true, maxZoom: 9 });

  if (!dsmWindow || dsmWindow.closed) {
    pendingFile = file;
    dsmWindow = window.open('dsm.html', 'dsmViewer');
    if (!dsmWindow) {
      // Popup bloqué par le navigateur
      document.getElementById('stats').textContent =
        '⚠ Popup bloqué — autorisez les popups pour ce fichier puis recliquez';
      pendingFile = null;
    }
  } else {
    // Onglet déjà ouvert : envoyer directement
    bc.postMessage({ type: 'loadFile', file });
    dsmWindow.focus();
  }
});

// ── Scan du dossier (aucun contenu lu) ───────────────────────
// webkitdirectory donne les File objects mais .arrayBuffer()
// n'est jamais appelé ici → zéro upload de contenu.
document.getElementById('btn-open').addEventListener('click', () => {
  document.getElementById('folder-in').click();
});
document.getElementById('folder-in').addEventListener('change', function(e) {
  downloaded.clear(); activeKey = null;
  for (const f of Array.from(e.target.files)) {
    // Ne garder que les .tif dans un sous-dossier Copernicus
    if (!/\.tif$/i.test(f.name)) continue;
    const parsed = parseTileName(f.webkitRelativePath || f.name);
    if (parsed) downloaded.set(tKey(parsed.swLat, parsed.swLon), f);
  }
  copGrid.redraw();
  document.getElementById('stats').textContent =
    `${downloaded.size} tuile(s) disponible(s)`;
});
</script>
</body>
</html>
